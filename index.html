<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign AI</title>


<style>


*{
box-sizing:border-box;
font-family:"Helvetica Neue",Arial,sans-serif;
}



body{

margin:0;

background:#f5f2eb;

color:#333;

}



/* NAV */

nav{

height:80px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 8%;

}



.logo{

font-size:24px;

letter-spacing:5px;

}



nav span{

font-size:14px;

color:#777;

}



/* HERO */


.hero{

min-height:90vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

animation:fade 1.5s;

}



@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}


to{

opacity:1;

}

}



.circle{

width:220px;

height:220px;

background:#e8e3d8;

border-radius:50%;

margin:auto;

display:flex;

align-items:center;

justify-content:center;

font-size:80px;

margin-bottom:40px;

}



h1{

font-size:60px;

font-weight:300;

letter-spacing:8px;

}



p{

font-size:20px;

line-height:2;

color:#666;

}



button{

margin-top:35px;

padding:16px 50px;

border:none;

background:#333;

color:white;

cursor:pointer;

font-size:16px;

}



button:hover{

opacity:.7;

}



/* ABOUT */


.about{

padding:80px 15%;

text-align:center;

background:white;

}



.about h2{

font-weight:400;

font-size:35px;

}



/* TRANSLATE */


#translate{

display:none;

padding:60px 8%;

}



.camera{

display:flex;

gap:40px;

}



video{

width:65%;

border-radius:10px;

background:black;

}



.result{

background:white;

width:35%;

display:flex;

align-items:center;

justify-content:center;

font-size:40px;

border:1px solid #ddd;

}



.status{

font-size:14px;

color:#999;

text-align:center;

margin-top:20px;

}



.back{

background:none;

color:#333;

border:1px solid #333;

}




@media(max-width:800px){

.camera{

flex-direction:column;

}


video,.result{

width:100%;

}

}


</style>

</head>



<body>



<nav>


<div class="logo">

SIGN AI

</div>


<span>

AI SIGN LANGUAGE TRANSLATOR

</span>


</nav>





<section class="hero">


<div>


<div class="circle">

🤟

</div>


<h1>

แปลภาษามือ

</h1>


<p>

AI ช่วยเปลี่ยนท่าทางภาษามือ<br>

เป็นข้อความแบบเรียลไทม์

</p>



<button onclick="openAI()">

เริ่มใช้งาน

</button>


</div>


</section>





<section class="about">


<h2>

เกี่ยวกับโปรแกรม

</h2>


<p>

ระบบนี้ถูกพัฒนาเพื่อช่วยลดข้อจำกัดในการสื่อสาร<br>

ระหว่างผู้ใช้ภาษามือและบุคคลทั่วไป

</p>


</section>







<section id="translate">


<h2>

Translator

</h2>


<br>


<div class="camera">


<video id="camera" autoplay></video>


<div class="result">


<span id="word">

รอการตรวจจับ...

</span>


</div>


</div>



<div class="status">

● AI กำลังประมวลผลแบบ Real-time

</div>



<button class="back" onclick="backHome()">

กลับ

</button>



</section>








<script>


function openAI(){


document.querySelector(".hero").style.display="none";


document.querySelector(".about").style.display="none";


document.getElementById("translate").style.display="block";



navigator.mediaDevices.getUserMedia({

video:true

})


.then(stream=>{


document.getElementById("camera").srcObject=stream;


});


}





function backHome(){


location.reload();


}





// จำลอง AI


let result=[

"สวัสดี",

"ขอบคุณ",

"รัก",

"ช่วยเหลือ",

"ยินดี"


];


setInterval(()=>{


let x=result[Math.floor(Math.random()*result.length)];


document.getElementById("word").innerHTML=x;



},2500);



</script>



</body>

</html>
